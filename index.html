<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV Directionnel - Version Complète</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px black;
            max-width: 90vw;
            text-align: center;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }
        .stat {
            font-size: 12px;
            margin: 2px 0;
            color: #0f0;
            font-family: monospace;
        }
        .error {
            color: #f55;
        }
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }
        button {
            background: #4ecdc4;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }
        button.secondary {
            background: #555;
            color: white;
        }
        button:hover {
            opacity: 0.9;
        }
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startMessage {
            font-size: 24px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #keyboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .key {
            background: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            min-width: 40px;
            text-align: center;
        }
        .key.validated {
            background: #0f0;
        }
        .key.invalid {
            background: #f55;
        }
        #leftControls, #rightControls {
            position: absolute;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
        }
        #leftControls {
            left: 10px;
            bottom: 10px;
        }
        #rightControls {
            right: 10px;
            bottom: 10px;
        }
        #finalStatsOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .final-stat {
            font-size: 24px;
            margin: 10px 0;
        }
        #restartBtn {
            background: #4ecdc4;
            padding: 15px 30px;
            font-size: 20px;
            margin-top: 20px;
        }
        #statusInit {
            font-size: 16px;
            margin-top: 10px;
            color: #0ff;
        }
        #errorMsg {
            color: #f55;
            font-size: 16px;
            text-align: center;
            margin-top: 20px;
        }
        #letterSizeControl {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        #scoreTopPanel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div id="letterDisplay"></div>
    <div id="ui">
        <div class="stat">Direction: --</div>
        <div class="stat">Score: 0%</div>
        <div class="stat">Vitesse: 0°/s</div>
        <div class="stat">Distance: -- cm</div>
        <div class="stat error" id="errorMsg"></div>
        <div class="speed-gauge">
            <div class="speed-bar" id="speedBar"></div>
        </div>
        <button id="startBtn">DÉMARRER</button>
        <button id="calibBtn" class="secondary">CALIBRER</button>
        <div id="calibPanel" style="display:none; margin-top:10px;">
            <input type="range" id="calibSlider" min="30" max="120" value="60">
            <div>Distance: <span id="calibValue">60</span> cm</div>
            <button id="saveCalibBtn" class="secondary">Sauvegarder</button>
        </div>
        <div id="statusInit"></div>
    </div>
    <div id="scoreTopPanel">Direction: -- | Score: 0% | Min: -- px</div>
    <div id="letterSizeControl">
        <button onclick="adjustLetterSize(-5)">↓</button>
        <span>Taille lettre: <span id="letterSizeValue">80</span> px</span>
        <button onclick="adjustLetterSize(5)">↑</button>
    </div>
    <div id="keyboard">
        <div class="key" onclick="validateLetter('D')">D</div>
        <div class="key" onclick="validateLetter('F')">F</div>
        <div class="key" onclick="validateLetter('P')">P</div>
        <div class="key" onclick="validateLetter('V')">V</div>
        <div class="key" onclick="validateLetter('A')">A</div>
        <div class="key" onclick="validateLetter('N')">N</div>
        <div class="key" onclick="validateLetter('L')">L</div>
        <div class="key" onclick="validateLetter('C')">C</div>
        <div class="key" onclick="validateLetter('O')">O</div>
        <div class="key" onclick="validateLetter('E')">E</div>
        <div class="key" onclick="validateLetter('R')">R</div>
        <div class="key" onclick="validateLetter('U')">U</div>
        <div class="key" onclick="validateLetter('S')">S</div>
        <div class="key" onclick="validateLetter('Z')">Z</div>
        <div class="key" onclick="validateLetter('H')">H</div>
    </div>
    <div id="leftControls">
        <button onclick="toggleCalib()">Calibrer</button>
    </div>
    <div id="rightControls">
        <button onclick="restartTest()">Recommencer</button>
    </div>
    <div id="startOverlay">
        <div id="startMessage">Cliquez sur DÉMARRER pour commencer</div>
    </div>
    <div id="finalStatsOverlay">
        <h2>Statistiques finales</h2>
        <div class="final-stat" id="finalStats"></div>
        <button id="restartBtn" onclick="restartTest()">Recommencer le test</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <script>
        // === VARIABLES GLOBALES ===
        let model;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let ui = document.getElementById('ui');
        let startOverlay = document.getElementById('startOverlay');
        let startMessage = document.getElementById('startMessage');
        let letterSizeControl = document.getElementById('letterSizeControl');
        let keyboard = document.getElementById('keyboard');
        let leftControls = document.getElementById('leftControls');
        let rightControls = document.getElementById('rightControls');
        let finalStatsOverlay = document.getElementById('finalStatsOverlay');
        let scoreTopPanel = document.getElementById('scoreTopPanel');
        let speedBar = document.getElementById('speedBar');
        let calibPanel = document.getElementById('calibPanel');
        let calibSlider = document.getElementById('calibSlider');
        let calibValue = document.getElementById('calibValue');
        let letterSizeValue = document.getElementById('letterSizeValue');

        // === PARAMÈTRES RESPECTANT VOS CONDITIONS ===
        const MIN_ANGULAR_SPEED = 150; // 150°/sec (seuil de déclenchement)
        const FLASH_DURATION = 60;     // 60ms (temps d'apparition de la lettre)
        const COOLDOWN_DURATION = 300; // ms (temps minimal entre deux lettres)
        const K_FACTOR = 2800;         // Facteur de calibration pour la distance

        // === AUTRES VARIABLES ===
        let calibrationFactor = 1.0;
        let distance = 60; // cm (distance estimée utilisateur-caméra)
        let letterSizePx = 80;
        let totalLetters = 0;
        let correctLetters = 0;
        let lastHeadPos = null;
        let lastTime = performance.now();
        let currentSpeedPxPerFrame = 0;
        let lastMovementDirection = null;
        let lastFlashTime = 0;
        let flashTimeout = null;
        let currentDisplayedLetter = '';
        let state = 'IDLE';

        // Statistiques par direction
        let movements = {
            right: { count: 0, correct: 0, minSize: Infinity },
            left: { count: 0, correct: 0, minSize: Infinity },
            up: { count: 0, correct: 0, minSize: Infinity },
            down: { count: 0, correct: 0, minSize: Infinity }
        };

        let currentDirection = 'right';
        let correctCount = 0;
        const letters = "D F P V A N L C O E R U S Z H".split(" ");

        // === FONCTIONS DE CONVERSION ===
        function pixelsToDegrees(pixelsMoved, distanceCm) {
            // 10 pixels ≈ 1 cm sur le visage
            // 57 cm = distance à laquelle 1 cm ≈ 1°
            return (pixelsMoved / 10) * (57 / distanceCm);
        }

        function calculateAngularSpeed(pixelsPerFrame, distanceCm) {
            const fps = 30; // Supposons 30 FPS
            const pixelsPerSecond = pixelsPerFrame * fps;
            return pixelsToDegrees(pixelsPerSecond, distanceCm);
        }

        // === DÉTECTION DE DIRECTION ===
        function detectDirection(currentPos, lastPos) {
            if (!lastPos) return;
            const dx = currentPos[0] - lastPos.x;
            const dy = currentPos[1] - lastPos.y;
            const threshold = 5;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) lastMovementDirection = 'right';
                else if (dx < -threshold) lastMovementDirection = 'left';
            } else {
                if (dy > threshold) lastMovementDirection = 'down';
                else if (dy < -threshold) lastMovementDirection = 'up';
            }
        }

        // === VALIDATION D'UNE LETTRE ===
        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;
            if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }

            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.classList.remove('validated', 'invalid'));

            const clickedKey = Array.from(keys).find(k => k.textContent === letter);
            if (clickedKey) {
                totalLetters++;
                if (letter === currentDisplayedLetter) {
                    correctLetters++;
                    movements[currentDirection].correct++;
                    clickedKey.classList.add('validated');
                    letterEl.style.opacity = '0';
                    if (letterSizePx < movements[currentDirection].minSize) {
                        movements[currentDirection].minSize = letterSizePx;
                    }
                } else {
                    clickedKey.classList.add('invalid');
                    letterSizePx = Math.min(300, letterSizePx + 5);
                }
                updateScore();
                updateLetterDisplay();
                if (++correctCount >= 3) {
                    correctCount = 0;
                    if (currentDirection === 'right') currentDirection = 'left';
                    else if (currentDirection === 'left') currentDirection = 'down';
                    else if (currentDirection === 'down') currentDirection = 'up';
                    else if (currentDirection === 'up') { showFinalStats(); return; }
                    updateScore();
                }
                state = 'IDLE';
            }
        }

        // === METTRE À JOUR L'AFFICHAGE ===
        function updateLetterDisplay() {
            letterEl.style.fontSize = `${letterSizePx}px`;
            letterEl.style.opacity = '0';
            letterSizeValue.textContent = letterSizePx;
        }

        // === AJUSTER LA TAILLE DES LETTRES ===
        function adjustLetterSize(change) {
            letterSizePx = Math.max(10, Math.min(300, letterSizePx + change));
            updateLetterDisplay();
        }

        // === METTRE À JOUR LE SCORE ===
        function updateScore() {
            const score = totalLetters > 0 ? Math.round((correctLetters / totalLetters) * 100) : 0;
            scoreTopPanel.innerHTML = `Direction: ${currentDirection} | Score: ${score}% | Min: ${movements[currentDirection].minSize !== Infinity ? movements[currentDirection].minSize + ' px' : '-- px'}`;
        }

        // === CALIBRATION ===
        function toggleCalib() {
            calibPanel.style.display = calibPanel.style.display === 'none' ? 'block' : 'none';
        }

        function updateCalib() {
            distance = parseInt(calibSlider.value);
            calibValue.textContent = distance;
        }

        function saveCalib() {
            localStorage.setItem('avTestDistance', distance);
            calibPanel.style.display = 'none';
        }

        function loadCalib() {
            const saved = localStorage.getItem('avTestDistance');
            if (saved) {
                distance = parseInt(saved);
                calibSlider.value = distance;
                calibValue.textContent = distance;
            }
        }

        // === AFFICHER LES STATS FINALES ===
        function showFinalStats() {
            finalStatsOverlay.style.display = 'flex';
            updateFinalStats();
        }

        function updateFinalStats() {
            const stats = Object.keys(movements).map(dir => {
                const m = movements[dir];
                const total = m.count;
                const correct = m.correct;
                const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
                return `${dir.toUpperCase()}: ${correct}/${total} (${accuracy}%) - Min: ${m.minSize !== Infinity ? m.minSize + 'px' : '--'}`;
            }).join('\n');
            document.getElementById('finalStats').textContent = stats;
        }

        // === RECOMMENCER LE TEST ===
        function restartTest() {
            totalLetters = 0;
            correctLetters = 0;
            correctCount = 0;
            currentDirection = 'right';
            letterSizePx = 80;
            movements = {
                right: { count: 0, correct: 0, minSize: Infinity },
                left: { count: 0, correct: 0, minSize: Infinity },
                up: { count: 0, correct: 0, minSize: Infinity },
                down: { count: 0, correct: 0, minSize: Infinity }
            };
            updateScore();
            finalStatsOverlay.style.display = 'none';
            state = 'IDLE';
        }

        // === INITIALISATION DU CLAVIER ===
        function initKeyboard() {
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => key.addEventListener('click', () => {
                validateLetter(key.textContent);
            }));
        }

        // === DÉMARRAGE DE L'APPLICATION ===
        async function startApp() {
            loadCalib();
            initKeyboard();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    startOverlay.style.display = 'none';
                    ui.style.display = 'block';
                    letterSizeControl.style.display = 'block';
                    keyboard.style.display = 'flex';
                    leftControls.style.display = 'block';
                    rightControls.style.display = 'block';
                    video.play();
                    document.getElementById('statusInit').innerText = "Chargement IA...";
                    model = await blazeface.load();
                    document.getElementById('statusInit').innerText = "IA prête";
                    startMessage.style.opacity = '1';
                    setTimeout(() => startMessage.style.opacity = '0', 1000);
                };
            } catch (err) {
                document.getElementById('errorMsg').textContent = "Erreur Caméra : " + err.message;
            }
        }

        // === BOUCLE PRINCIPALE (RESPECT DES CONDITIONS) ===
        async function loop() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);
            const now = performance.now();

            if (predictions.length > 0) {
                const face = predictions[0];
                const currentPos = face.landmarks[2]; // Nez

                // Calcul de la vitesse linéaire (pixels/frame)
                const deltaTime = now - lastTime;
                lastTime = now;

                if (lastHeadPos) {
                    const dx = currentPos[0] - lastHeadPos.x;
                    const dy = currentPos[1] - lastHeadPos.y;
                    const distanceMoved = Math.sqrt(dx*dx + dy*dy);
                    currentSpeedPxPerFrame = distanceMoved;
                } else {
                    currentSpeedPxPerFrame = 0;
                }

                lastHeadPos = { x: currentPos[0], y: currentPos[1] };

                // Détection de la direction
                detectDirection(currentPos, lastHeadPos);

                // Calcul de la vitesse angulaire (°/sec)
                const angularSpeed = calculateAngularSpeed(currentSpeedPxPerFrame, distance);

                // Mise à jour de la distance (calibration automatique)
                const leftEye = face.landmarks[0];
                const rightEye = face.landmarks[1];
                const distInterYeuxPx = Math.sqrt(
                    Math.pow(rightEye[0] - leftEye[0], 2) +
                    Math.pow(rightEye[1] - leftEye[1], 2)
                );
                if (distInterYeuxPx > 5) {
                    let calculatedDist = K_FACTOR / distInterYeuxPx;
                    distance = (distance * 0.9) + (calculatedDist * 0.1);
                    distance = Math.max(30, Math.min(120, distance));
                }

                // Affichage de la vitesse dans l'UI
                speedBar.style.width = `${Math.min(100, angularSpeed / 3)}%`;
                document.querySelector('#ui .stat:nth-child(3)').textContent = `Vitesse: ${Math.round(angularSpeed)}°/s`;
                document.querySelector('#ui .stat:nth-child(4)').textContent = `Distance: ${Math.round(distance)} cm`;

                // DÉCLENCHEMENT DES LETTRES AVEC LES CONDITIONS RESPECTÉES
                if (state === 'IDLE' && angularSpeed >= MIN_ANGULAR_SPEED && (now - lastFlashTime > COOLDOWN_DURATION)) {
                    if (lastMovementDirection === currentDirection) {
                        state = 'WAITING_VALIDATION';
                        lastFlashTime = now;
                        currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
                        letterEl.textContent = currentDisplayedLetter;
                        letterEl.style.opacity = '1';

                        if (lastMovementDirection && movements[lastMovementDirection]) {
                            movements[lastMovementDirection].count++;
                        }

                        if (flashTimeout) clearTimeout(flashTimeout);
                        flashTimeout = setTimeout(() => {
                            if (state === 'WAITING_VALIDATION') {
                                letterEl.style.opacity = '0';
                            }
                        }, FLASH_DURATION); // 60ms ici !
                    }
                }
            }
            requestAnimationFrame(loop);
        }

        // === INITIALISATION ===
        window.onload = () => {
            document.getElementById('startBtn').addEventListener('click', startApp);
            calibSlider.addEventListener('input', updateCalib);
            document.getElementById('saveCalibBtn').addEventListener('click', saveCalib);
        };
    </script>
</body>
</html>
