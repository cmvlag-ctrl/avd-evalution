<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV Directionnel - Version Modifiée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px black;
            max-width: 90vw;
            text-align: center;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }
        .stat {
            font-family: monospace;
            font-size: 12px;
            margin: 5px 0;
        }
        #keyboard {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            z-index: 20;
        }
        .key {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .key:hover {
            background: #555;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay"></div>
    <div id="ui">
        <div class="stat">Direction: <span id="currentDirection">Aucune</span></div>
        <div class="stat">Taille: <span id="currentSize">100px</span></div>
        <div class="stat">Score: <span id="currentScore">0/0</span></div>
        <div class="stat">Vitesse: <span id="speedValue">0</span> °/s</div>
    </div>
    <div id="keyboard" class="hidden">
        <div class="key" data-letter="A">A</div>
        <div class="key" data-letter="B">B</div>
        <div class="key" data-letter="C">C</div>
        <div class="key" data-letter="D">D</div>
        <div class="key" data-letter="E">E</div>
        <div class="key" data-letter="F">F</div>
        <div class="key" data-letter="G">G</div>
        <div class="key" data-letter="H">H</div>
        <div class="key" data-letter="I">I</div>
        <div class="key" data-letter="J">J</div>
        <div class="key" data-letter="K">K</div>
        <div class="key" data-letter="L">L</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.9.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.6"></script>
    <script>
        // --- CONSTANTES DE CALIBRATION ---
        const FOCAL_LENGTH_PX = 800;  // Focale en pixels (valeur typique pour webcam)
        const DISTANCE_CM = 60;       // Distance estimée caméra-visage (en cm)
        const DEG_PER_RAD = 180 / Math.PI;
        const MIN_SPEED_TRIGGER = 150; // Seuil de vitesse en °/s
        const FLASH_DURATION = 60;     // Durée d'affichage en ms
        const COOLDOWN_DURATION = 1000; // Temps minimum entre deux affichages

        // --- CONSTANTES DE TEST ---
        const DIRECTIONS = ['right', 'left', 'down', 'up'];
        const LETTER_SIZES = [100, 80, 60, 40, 30, 20, 15, 10, 8, 6, 5, 4, 3];
        const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];

        // --- ÉTATS ---
        const TEST_STATES = {
            IDLE: 0,
            WAITING_VALIDATION: 1,
            COMPLETED: 2
        };

        // --- VARIABLES GLOBALES ---
        let video = document.getElementById('video');
        let letterDisplay = document.getElementById('letterDisplay');
        let currentDirectionEl = document.getElementById('currentDirection');
        let currentSizeEl = document.getElementById('currentSize');
        let currentScoreEl = document.getElementById('currentScore');
        let speedValueEl = document.getElementById('speedValue');
        let keyboard = document.getElementById('keyboard');

        let model;
        let lastHeadPos = null;
        let lastTime = performance.now();
        let speedDegPerSec = 0;
        let smoothedSpeed = 0;
        let currentTestState = TEST_STATES.IDLE;
        let currentDirectionIndex = 0;
        let currentLetterSizeIndex = 0;
        let currentLetter = '';
        let scores = { right: 0, left: 0, down: 0, up: 0 };
        let lastFlashTime = 0;
        let lastMovementDirection = null;

        // --- INITIALISATION ---
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    model = await blazeface.load();
                    setupKeyboard();
                    loop();
                };
            } catch(err) {
                console.error("Erreur caméra:", err);
                alert("Erreur caméra: " + err.message);
            }
        }

        // --- CONVERSION PIXELS → DEGRÉS ---
        function pixelsToDegPerSec(pixelsPerSec) {
            const cmPerPx = (DISTANCE_CM * 2) / FOCAL_LENGTH_PX;
            const cmPerSec = pixelsPerSec * cmPerPx;
            return (cmPerSec / DISTANCE_CM) * DEG_PER_RAD;
        }

        // --- DÉTECTION DE DIRECTION ---
        function detectDirection(face) {
            const nose = face.landmarks[2];
            const leftEye = face.landmarks[0];
            const rightEye = face.landmarks[1];
            const chin = face.landmarks[15];

            const dx = nose[0] - ((leftEye[0] + rightEye[0]) / 2);
            const dy = nose[1] - chin[1];

            if (Math.abs(dx) > Math.abs(dy)) {
                return dx > 0 ? 'right' : 'left';
            } else {
                return dy > 0 ? 'down' : 'up';
            }
        }

        // --- CONFIGURATION DU CLAVIER ---
        function setupKeyboard() {
            const keys = keyboard.querySelectorAll('.key');
            keys.forEach(key => {
                key.addEventListener('click', () => {
                    validateLetter(key.dataset.letter);
                });
            });
        }

        // --- VALIDATION DE LA LETTRE ---
        function validateLetter(letter) {
            if (currentTestState !== TEST_STATES.WAITING_VALIDATION) return;

            keyboard.classList.add('hidden');
            currentTestState = TEST_STATES.IDLE;

            // Mise à jour du score
            scores[currentDirectionIndex]++;
            currentScoreEl.textContent = `${scores[currentDirectionIndex]}/${LETTER_SIZES[currentLetterSizeIndex]}`;

            // Passer à la taille suivante ou direction suivante
            if (scores[currentDirectionIndex] >= 3) {
                // Taille minimale trouvée pour cette direction
                currentLetterSizeIndex++;
                scores[currentDirectionIndex] = 0;

                if (currentLetterSizeIndex >= LETTER_SIZES.length) {
                    // Direction terminée
                    currentLetterSizeIndex = 0;
                    currentDirectionIndex++;

                    if (currentDirectionIndex >= DIRECTIONS.length) {
                        // Test complet terminé
                        alert("Test terminé! Résultats:\n" +
                              `Droite: ${LETTER_SIZES[findMinSize('right')]}px\n` +
                              `Gauche: ${LETTER_SIZES[findMinSize('left')]}px\n` +
                              `Bas: ${LETTER_SIZES[findMinSize('down')]}px\n` +
                              `Haut: ${LETTER_SIZES[findMinSize('up')]}px`);
                        return;
                    }
                }
            }

            // Préparer le prochain test
            updateUI();
        }

        // --- MISE À JOUR DE L'INTERFACE ---
        function updateUI() {
            currentDirectionEl.textContent = DIRECTIONS[currentDirectionIndex];
            currentSizeEl.textContent = `${LETTER_SIZES[currentLetterSizeIndex]}px`;
        }

        // --- TROUVER TAILLE MINIMALE ---
        function findMinSize(direction) {
            for (let i = 0; i < LETTER_SIZES.length; i++) {
                if (scores[direction] >= 3) return i;
            }
            return 0;
        }

        // --- BOUCLE PRINCIPALE ---
        async function loop() {
            if (!model) return requestAnimationFrame(loop);

            const predictions = await model.estimateFaces(video, false);
            if (predictions.length > 0) {
                const face = predictions[0];
                const now = performance.now();

                // 1. CALCUL VITESSE (en pixels/ms)
                const nose = face.landmarks[2];
                if (lastHeadPos) {
                    const dt = now - lastTime;
                    if (dt > 0) {
                        const dx = nose[0] - lastHeadPos.x;
                        const dy = nose[1] - lastHeadPos.y;
                        const distPx = Math.sqrt(dx*dx + dy*dy);
                        const rawSpeedPxPerSec = (distPx / dt) * 1000;
                        smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeedPxPerSec * 0.3);
                        speedDegPerSec = pixelsToDegPerSec(smoothedSpeed);
                    }
                }
                lastHeadPos = { x: nose[0], y: nose[1] };
                lastTime = now;

                // 2. DÉTECTION DE DIRECTION
                lastMovementDirection = detectDirection(face);

                // 3. GESTION DES ÉTATS - MODIFICATION PRINCIPALE ICI
                if (currentTestState === TEST_STATES.IDLE &&
                    now - lastFlashTime > COOLDOWN_DURATION &&
                    speedDegPerSec > MIN_SPEED_TRIGGER) {

                    // MODIFICATION: Vérifier que la direction du mouvement correspond à la direction cible
                    const targetDirection = DIRECTIONS[currentDirectionIndex];

                    if ((targetDirection === 'right' && lastMovementDirection === 'right') ||
                        (targetDirection === 'left' && lastMovementDirection === 'left') ||
                        (targetDirection === 'down' && lastMovementDirection === 'down') ||
                        (targetDirection === 'up' && lastMovementDirection === 'up')) {

                        currentTestState = TEST_STATES.WAITING_VALIDATION;
                        currentLetter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
                        letterDisplay.textContent = currentLetter;
                        letterDisplay.style.fontSize = `${LETTER_SIZES[currentLetterSizeIndex]}px`;
                        letterDisplay.style.opacity = '1';

                        // Afficher le clavier
                        keyboard.classList.remove('hidden');

                        // Réinitialiser le score pour cette validation
                        currentScoreEl.textContent = `0/${LETTER_SIZES[currentLetterSizeIndex]}`;

                        // Planifier la disparition de la lettre
                        setTimeout(() => {
                            if (currentTestState === TEST_STATES.WAITING_VALIDATION) {
                                letterDisplay.style.opacity = '0';
                                keyboard.classList.add('hidden');
                                currentTestState = TEST_STATES.IDLE;
                            }
                        }, FLASH_DURATION);

                        lastFlashTime = now;
                    }
                }

                // 4. MISE À JOUR DEBUG
                speedValueEl.textContent = speedDegPerSec.toFixed(1);
            } else {
                smoothedSpeed = smoothedSpeed * 0.9;
                speedDegPerSec = pixelsToDegPerSec(smoothedSpeed);
                speedValueEl.textContent = speedDegPerSec.toFixed(1);
            }

            requestAnimationFrame(loop);
        }

        // --- DÉMARRAGE ---
        init();
    </script>
</body>
</html>
