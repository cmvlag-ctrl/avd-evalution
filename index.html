<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV Directionnel - Version Fonctionnelle</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7; /* CORRIGÉ : Plus visible */
            z-index: 1;
            transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 15px black;
            max-width: 90vw;
            text-align: center;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 50; /* CORRIGÉ : Plus haut que la vidéo */
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }
        .stat {
            font-size: 14px;
            margin: 5px 0;
            color: #0ff;
            font-family: monospace;
        }
        .error {
            color: #f55;
            font-weight: bold;
        }
        button {
            background: #4ecdc4;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }
        button:hover {
            opacity: 0.9;
        }
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startMessage {
            font-size: 24px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #errorMsg {
            color: #f55;
            font-size: 16px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }
        #keyboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            z-index: 50;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .key {
            background: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            min-width: 40px;
            text-align: center;
        }
        .key.validated {
            background: #0f0;
        }
        #finalStatsOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #restartBtn {
            background: #4ecdc4;
            padding: 15px 30px;
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <video id="video" autoplay muted playsinline></video>
    <div id="letterDisplay"></div>
    <div id="ui">
        <div class="stat">État: <span id="stateText">Initialisation...</span></div>
        <div class="stat">Caméra: <span id="cameraStatus">Non démarrée</span></div>
        <div class="stat">IA: <span id="aiStatus">Non chargée</span></div>
        <div class="error" id="errorMsg"></div>
        <button id="startBtn">DÉMARRER LA CAMÉRA</button>
    </div>
    <div id="keyboard">
        <div class="key" onclick="validateLetter('D')">D</div>
        <div class="key" onclick="validateLetter('F')">F</div>
        <div class="key" onclick="validateLetter('P')">P</div>
        <div class="key" onclick="validateLetter('V')">V</div>
        <div class="key" onclick="validateLetter('A')">A</div>
        <div class="key" onclick="validateLetter('N')">N</div>
        <div class="key" onclick="validateLetter('L')">L</div>
        <div class="key" onclick="validateLetter('C')">C</div>
        <div class="key" onclick="validateLetter('O')">O</div>
        <div class="key" onclick="validateLetter('E')">E</div>
        <div class="key" onclick="validateLetter('R')">R</div>
        <div class="key" onclick="validateLetter('U')">U</div>
        <div class="key" onclick="validateLetter('S')">S</div>
        <div class="key" onclick="validateLetter('Z')">Z</div>
        <div class="key" onclick="validateLetter('H')">H</div>
    </div>
    <div id="startOverlay">
        <div id="startMessage">Cliquez sur "DÉMARRER LA CAMÉRA"</div>
    </div>
    <div id="finalStatsOverlay">
        <h2>Statistiques</h2>
        <div id="finalStats"></div>
        <button id="restartBtn" onclick="restartTest()">Recommencer</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <script>
        // === VARIABLES GLOBALES ===
        let model;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let ui = document.getElementById('ui');
        let startOverlay = document.getElementById('startOverlay');
        let startMessage = document.getElementById('startMessage');
        let keyboard = document.getElementById('keyboard');
        let finalStatsOverlay = document.getElementById('finalStatsOverlay');
        let stateText = document.getElementById('stateText');
        let cameraStatus = document.getElementById('cameraStatus');
        let aiStatus = document.getElementById('aiStatus');
        let errorMsg = document.getElementById('errorMsg');
        let finalStats = document.getElementById('finalStats');

        // === PARAMÈTRES ===
        const MIN_ANGULAR_SPEED = 150; // 150°/sec
        const FLASH_DURATION = 60;     // 60ms
        const COOLDOWN_DURATION = 300; // ms

        // === VARIABLES D'EXÉCUTION ===
        let distance = 60;
        let currentSpeedPxPerFrame = 0;
        let lastHeadPos = null;
        let lastTime = performance.now();
        let lastMovementDirection = null;
        let lastFlashTime = 0;
        let flashTimeout = null;
        let currentDisplayedLetter = '';
        let state = 'IDLE';
        let totalLetters = 0;
        let correctLetters = 0;
        let correctCount = 0;
        let currentDirection = 'right';
        let movements = {
            right: { count: 0, correct: 0 },
            left: { count: 0, correct: 0 },
            up: { count: 0, correct: 0 },
            down: { count: 0, correct: 0 }
        };

        const letters = "D F P V A N L C O E R U S Z H".split(" ");

        // === INITIALISATION ===
        async function init() {
            stateText.textContent = "Initialisation...";
            updateUI();

            try {
                // 1. Démarrer la caméra
                stateText.textContent = "Demande d'accès caméra...";
                updateUI();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });

                video.srcObject = stream;
                cameraStatus.textContent = "✅ Démarrée";
                stateText.textContent = "Caméra active...";
                updateUI();

                // 2. Attendre que la vidéo soit prête
                video.onloadedmetadata = async () => {
                    stateText.textContent = "Chargement IA (Blazeface)...";
                    updateUI();
                    try {
                        model = await blazeface.load();
                        aiStatus.textContent = "✅ Chargée";
                        stateText.textContent = "Prêt !";
                        updateUI();

                        // Masquer l'overlay de démarrage
                        startOverlay.style.display = 'none';
                        keyboard.style.display = 'flex';
                        ui.style.display = 'block';

                        // Démarrer la boucle principale
                        video.play();
                        setTimeout(() => startMessage.style.opacity = '0', 1000);
                        requestAnimationFrame(loop);
                    } catch (err) {
                        showError("Erreur IA: " + err.message);
                    }
                };
            } catch (err) {
                showError("Erreur caméra: " + err.message);
                cameraStatus.textContent = "❌ " + err.message;
                updateUI();
            }
        }

        // === GESTION DES ERREURS ===
        function showError(message) {
            errorMsg.textContent = message;
            console.error(message);
        }

        function updateUI() {
            // Met à jour tous les éléments d'UI
        }

        // === BOUCLE PRINCIPALE (CORRIGÉE) ===
        async function loop() {
            if (!model || !video.srcObject) {
                requestAnimationFrame(loop);
                return;
            }

            try {
                const predictions = await model.estimateFaces(video, false);
                const now = performance.now();

                if (predictions.length > 0) {
                    const face = predictions[0];
                    const currentPos = face.landmarks[2]; // Nez

                    // Calcul de la vitesse linéaire
                    const deltaTime = now - lastTime;
                    lastTime = now;

                    if (lastHeadPos) {
                        const dx = currentPos[0] - lastHeadPos.x;
                        const dy = currentPos[1] - lastHeadPos.y;
                        const distanceMoved = Math.sqrt(dx*dx + dy*dy);
                        currentSpeedPxPerFrame = distanceMoved;
                    } else {
                        currentSpeedPxPerFrame = 0;
                    }

                    lastHeadPos = { x: currentPos[0], y: currentPos[1] };

                    // Détection de direction
                    const dx = currentPos[0] - lastHeadPos.x;
                    const dy = currentPos[1] - lastHeadPos.y;
                    const threshold = 5;

                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > threshold) lastMovementDirection = 'right';
                        else if (dx < -threshold) lastMovementDirection = 'left';
                    } else {
                        if (dy > threshold) lastMovementDirection = 'down';
                        else if (dy < -threshold) lastMovementDirection = 'up';
                    }

                    // Calcul de la vitesse angulaire
                    const angularSpeed = (currentSpeedPxPerFrame * 30) * 0.1; // Approximation

                    // DÉCLENCHEMENT DES LETTRES (avec vos conditions)
                    if (state === 'IDLE' && angularSpeed >= MIN_ANGULAR_SPEED && (now - lastFlashTime > COOLDOWN_DURATION)) {
                        if (lastMovementDirection === currentDirection) {
                            state = 'WAITING_VALIDATION';
                            lastFlashTime = now;
                            currentDisplayedLetter = letters[Math.floor(Math.random() * letters.length)];
                            letterEl.textContent = currentDisplayedLetter;
                            letterEl.style.opacity = '1';

                            if (lastMovementDirection && movements[lastMovementDirection]) {
                                movements[lastMovementDirection].count++;
                            }

                            if (flashTimeout) clearTimeout(flashTimeout);
                            flashTimeout = setTimeout(() => {
                                if (state === 'WAITING_VALIDATION') {
                                    letterEl.style.opacity = '0';
                                }
                            }, FLASH_DURATION);
                        }
                    }
                }
            } catch (err) {
                console.error("Erreur dans la boucle:", err);
            }

            requestAnimationFrame(loop);
        }

        // === VALIDATION DES LETTRES ===
        function validateLetter(letter) {
            if (state !== 'WAITING_VALIDATION') return;
            if (flashTimeout) { clearTimeout(flashTimeout); flashTimeout = null; }

            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.classList.remove('validated', 'invalid'));

            const clickedKey = Array.from(keys).find(k => k.textContent === letter);
            if (clickedKey) {
                totalLetters++;
                if (letter === currentDisplayedLetter) {
                    correctLetters++;
                    movements[currentDirection].correct++;
                    clickedKey.classList.add('validated');
                    letterEl.style.opacity = '0';
                } else {
                    clickedKey.classList.add('invalid');
                }

                if (++correctCount >= 3) {
                    correctCount = 0;
                    if (currentDirection === 'right') currentDirection = 'left';
                    else if (currentDirection === 'left') currentDirection = 'down';
                    else if (currentDirection === 'down') currentDirection = 'up';
                    else if (currentDirection === 'up') {
                        showFinalStats();
                        return;
                    }
                }
                state = 'IDLE';
            }
        }

        // === STATISTIQUES FINALES ===
        function showFinalStats() {
            finalStatsOverlay.style.display = 'flex';
            const stats = Object.keys(movements).map(dir => {
                const m = movements[dir];
                const accuracy = m.count > 0 ? Math.round((m.correct / m.count) * 100) : 0;
                return `${dir.toUpperCase()}: ${m.correct}/${m.count} (${accuracy}%)`;
            }).join('\n');
            finalStats.textContent = stats;
        }

        function restartTest() {
            totalLetters = 0;
            correctLetters = 0;
            correctCount = 0;
            currentDirection = 'right';
            movements = {
                right: { count: 0, correct: 0 },
                left: { count: 0, correct: 0 },
                up: { count: 0, correct: 0 },
                down: { count: 0, correct: 0 }
            };
            finalStatsOverlay.style.display = 'none';
            state = 'IDLE';
        }

        // === DÉMARRAGE ===
        document.getElementById('startBtn').addEventListener('click', init);
    </script>
</body>
</html>
